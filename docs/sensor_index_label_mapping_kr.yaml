title: "Method-Level Sensor Index Label Mapping"
rule: "STR 센서는 1~12, ACC 센서는 13~24로 고정한다."

abbreviations:
  S1: "Span 1"
  S2: "Span 2"
  DO: "Downstream"
  UP: "Upstream"
  INF: "하부 longitudinal strain"
  SUP: "상부 longitudinal strain"
  SHE: "대각 shear strain"
  INT: "intermediate acceleration"
  MID: "midspan acceleration"
  STR: "strain"
  ACC_Y: "Y축 acceleration"
  ACC_Z: "Z축 acceleration"

sensor_index:
  1:  "S1 DO INF STR"
  2:  "S1 DO SHE STR"
  3:  "S1 DO SUP STR"
  4:  "S2 DO INF STR"
  5:  "S2 DO SHE STR"
  6:  "S2 DO SUP STR"
  7:  "S1 UP INF STR"
  8:  "S1 UP SHE STR"
  9:  "S1 UP SUP STR"
  10: "S2 UP INF STR"
  11: "S2 UP SHE STR"
  12: "S2 UP SUP STR"
  13: "S1 DO INT ACC_Y"
  14: "S1 DO INT ACC_Z"
  15: "S1 DO MID ACC_Y"
  16: "S1 DO MID ACC_Z"
  17: "S2 DO INT ACC_Y"
  18: "S2 DO INT ACC_Z"
  19: "S2 DO MID ACC_Y"
  20: "S2 DO MID ACC_Z"
  21: "S1 UP INT ACC_Z"
  22: "S1 UP MID ACC_Z"
  23: "S2 UP INT ACC_Z"
  24: "S2 UP MID ACC_Z"
